name: crossposter

on:
  schedule:
    # Mar / Mer / Jeu à 06:00 UTC = 08:00 Paris (été) / 07:00 Paris (hiver).
    # Marge de ~30 min pour le délai GitHub Actions, garantit toujours avant 9h Paris.
    - cron: "0 6 * * 2,3,4"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Simuler sans publier (pour tester la CI)"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  crosspost:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Run crossposter
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_USER_URN: ${{ secrets.LINKEDIN_USER_URN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm run crosspost:dry
          else
            npm run crosspost
          fi

      - name: Commit state update
        run: |
          if git diff --quiet .crossposter-state.json; then
            echo "Pas de changement d'état."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .crossposter-state.json
          git commit -m "chore(crossposter): update state"
          git push
